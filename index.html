<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carthage AI Pro - قرطاج الذكي الاحترافي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Readex+Pro:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff2d55;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* واجهة الدخول - Netflix Style */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 0.8s ease-in-out;
        }

        .ai-loader {
            color: var(--accent);
            font-size: 2.5rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 8px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.3; transform: scale(0.9); } to { opacity: 1; transform: scale(1.1); } }

        body {
            font-family: 'Readex Pro', sans-serif;
            background: #080808;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            padding-bottom: 140px;
        }

        header { text-align: center; margin-bottom: 20px; }
        header h1 {
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            margin: 0;
        }

        .preview-area {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #imageCanvas { max-width: 100%; display: none; touch-action: none; }

        /* لوحة الضبط الشاملة */
        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
            max-height: 350px;
            overflow-y: auto; /* للسماح بالتمرير داخل الأدوات */
        }

        .panel-title { font-size: 0.9rem; color: #D4AF37; margin-bottom: 15px; text-align: right; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        .control-row { margin-bottom: 15px; }
        .control-row label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #bbb; margin-bottom: 8px; }
        .control-row span { color: var(--accent); font-weight: bold; }

        input[type="range"] {
            width: 100%; height: 4px; background: #333; border-radius: 2px; appearance: none; accent-color: var(--accent);
        }

        /* شريط الأدوات السفلي */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 450px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 100;
            border-radius: 24px 24px 0 0;
        }

        .tool-btn {
            background: none; border: none; color: #666; font-family: 'Readex Pro', sans-serif;
            font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
        }

        .tool-btn.active { color: var(--accent); }
        .tool-icon { font-size: 1.3rem; }

        #downloadBtn { background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; }

        #upload-btn-label { background: var(--accent); color: white; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        #brush-cursor { width: 25px; height: 25px; border: 2px solid #fff; border-radius: 50%; position: fixed; pointer-events: none; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="ai-loader">CARTHAGE AI PRO</div>
    </div>
    
    <div id="brush-cursor"></div>

    <div class="app-container">
        <header>
            <h1>Carthage AI Pro</h1>
        </header>

        <div class="preview-area" id="dropZone">
            <label id="upload-btn-label" for="imageLoader">تحميل صورة</label>
            <input type="file" id="imageLoader" accept="image/*" style="display:none">
            <canvas id="imageCanvas"></canvas>
        </div>

        <div class="glass-panel" id="adjustPanel">
            <div class="panel-title">استوديو الضبط الاحترافي</div>
            
            <div class="control-row"><label>السطوع <span>Brightness</span></label><input type="range" id="brightness" min="50" max="150" value="100"></div>
            
            <div class="control-row"><label>التباين <span>Contrast</span></label><input type="range" id="contrast" min="50" max="150" value="100"></div>
            
            <div class="control-row"><label>الألوان <span>Saturation</span></label><input type="range" id="saturate" min="0" max="200" value="100"></div>
            
            <div class="control-row"><label>درجة الحرارة <span>Warmth</span></label><input type="range" id="warmth" min="-100" max="100" value="0"></div>
            
            <div class="control-row"><label>الحدة/الغباش <span>Blur</span></label><input type="range" id="blur" min="0" max="10" value="0" step="0.1"></div>
            
            <div class="control-row"><label>الظلال <span>Darkness</span></label><input type="range" id="dark" min="0" max="100" value="0"></div>

            <div class="control-row"><label>قلب الألوان <span>Invert</span></label><input type="range" id="invert" min="0" max="100" value="0"></div>
            
            <button onclick="resetAll()" style="width:100%; background:var(--glass); border:1px solid var(--border); color:#fff; padding:10px; border-radius:10px; font-size: 0.8rem;">إعادة تعيين الضبط ↺</button>
        </div>

        <div class="glass-panel" id="filterPanel">
            <div class="panel-title">الفلاتر الذكية</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="tool-btn" style="background:var(--glass); padding:10px; border-radius:10px;" onclick="setPreset('none')">الأصل</button>
                <button class="tool-btn" style="background:var(--glass); padding:10px; border-radius:10px;" onclick="setPreset('contrast(1.4) saturate(1.4) brightness(1.1)')">Vivid AI</button>
                <button class="tool-btn" style="background:var(--glass); padding:10px; border-radius:10px;" onclick="setPreset('sepia(0.6) brightness(0.9)')">Vintage</button>
                <button class="tool-btn" style="background:var(--glass); padding:10px; border-radius:10px;" onclick="setPreset('grayscale(100%) brightness(1.1)')">Noir</button>
            </div>
        </div>

        <div class="glass-panel" id="eraserPanel">
            <div class="panel-title">الممحاة الذكية</div>
            <div class="control-row">
                <label>حجم المسح</label>
                <input type="range" id="brushSize" min="5" max="80" value="30">
            </div>
            <p style="font-size: 0.7rem; color: #666; text-align: center;">استخدم إصبعك لمسح العناصر غير المرغوب فيها</p>
        </div>
    </div>

    <div class="bottom-bar" id="toolBar" style="display: none;">
        <button class="tool-btn active" onclick="showPanel('adjust')"><span class="tool-icon">🎛️</span><span>ضبط</span></button>
        <button class="tool-btn" onclick="showPanel('filter')"><span class="tool-icon">🎬</span><span>فلاتر</span></button>
        <button class="tool-btn" onclick="showPanel('eraser'); startEraserMode()"><span class="tool-icon">✨</span><span>ممحاة</span></button>
        <button id="downloadBtn" onclick="downloadImage()">حفظ</button>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const controls = ['brightness', 'contrast', 'saturate', 'warmth', 'blur', 'dark', 'invert'];
        const brushCursor = document.getElementById('brush-cursor');

        let imgObj = new Image(), isEraserMode = false, isDrawing = false, brushSize = 30;

        // واجهة الدخول
        window.onload = () => { setTimeout(() => { 
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
        }, 2000); };

        imageLoader.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                imgObj.onload = () => {
                    const maxWidth = document.getElementById('dropZone').offsetWidth;
                    canvas.width = maxWidth; canvas.height = imgObj.height * (maxWidth / imgObj.width);
                    canvas.style.display = 'block';
                    document.getElementById('upload-btn-label').style.display = 'none';
                    document.getElementById('toolBar').style.display = 'flex';
                    showPanel('adjust'); update();
                }
                imgObj.src = ev.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        function update() {
            if (isEraserMode) return;
            const vals = {};
            controls.forEach(id => vals[id] = document.getElementById(id).value);
            
            const warmth = vals.warmth > 0 ? `sepia(${vals.warmth}%)` : `hue-rotate(${Math.abs(vals.warmth)}deg)`;
            
            ctx.filter = `
                brightness(${vals.brightness}%) 
                contrast(${vals.contrast}%) 
                saturate(${vals.saturate}%) 
                ${warmth} 
                blur(${vals.blur}px) 
                brightness(${100 - vals.dark/2}%)
                invert(${vals.invert}%)
            `;
            ctx.drawImage(imgObj, 0, 0, canvas.width, canvas.height);
        }

        controls.forEach(id => document.getElementById(id).oninput = update);

        function showPanel(name) {
            document.querySelectorAll('.glass-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name + 'Panel').style.display = 'block';
            if(event) event.currentTarget.classList.add('active');
            isEraserMode = (name === 'eraser');
            brushCursor.style.display = isEraserMode ? 'block' : 'none';
        }

        function resetAll() { 
            controls.forEach(id => {
                const el = document.getElementById(id);
                el.value = el.getAttribute('value');
            });
            update(); 
        }

        function setPreset(f) { 
            ctx.filter = f; 
            ctx.drawImage(imgObj, 0, 0, canvas.width, canvas.height); 
        }

        // منطق الممحاة
        document.getElementById('brushSize').oninput = (e) => { 
            brushSize = e.target.value; 
            brushCursor.style.width = brushSize + 'px'; 
            brushCursor.style.height = brushSize + 'px'; 
        };

        canvas.addEventListener('pointerdown', (e) => { if(!isEraserMode) return; isDrawing = true; ctx.beginPath(); });
        canvas.addEventListener('pointermove', (e) => {
            if(!isEraserMode) return;
            brushCursor.style.left = (e.clientX || e.touches[0].clientX) - brushSize/2 + 'px';
            brushCursor.style.top = (e.clientY || e.touches[0].clientY) - brushSize/2 + 'px';
            if(!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = brushSize; ctx.lineCap = 'round';
            ctx.lineTo((e.clientX || e.touches[0].clientX) - rect.left, (e.clientY || e.touches[0].clientY) - rect.top);
            ctx.stroke();
        });
        window.addEventListener('pointerup', () => { isDrawing = false; ctx.globalCompositeOperation = 'source-over'; });

        function downloadImage() {
            const link = document.createElement('a'); 
            link.download = 'Carthage_Pro_AI.png';
            link.href = canvas.toDataURL(); 
            link.click();
        }
    </script>
</body>
</html>
