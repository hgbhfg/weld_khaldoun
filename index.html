<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carthage AI - قرطاج الذكي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Readex+Pro:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff2d55;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* واجهة الدخول - التطور */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 0.8s ease-in-out;
        }

        .ai-loader {
            color: var(--accent);
            font-size: 2.5rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 8px;
            animation: pulse 2s infinite alternate;
            text-shadow: 0 0 30px rgba(255, 45, 85, 0.5);
        }

        @keyframes pulse {
            from { opacity: 0.3; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }

        body {
            font-family: 'Readex Pro', sans-serif;
            background: #080808;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* رأس الصفحة العصري */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin: 0;
        }

        /* منطقة عرض الصورة */
        .preview-area {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { width: 100%; display: none; }

        /* أزرار التحكم */
        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        /* زر التعديل التلقائي السحري */
        .magic-btn {
            width: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .control-row { margin-bottom: 15px; }
        .control-row label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 8px; }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            appearance: none;
            accent-color: var(--accent);
        }

        .filters-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            display: none;
        }

        .filter-chip {
            flex: 0 0 auto;
            background: var(--glass);
            border: 1px solid var(--border);
            color: #ddd;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .download-btn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 10px;
            display: none;
        }

        #upload-btn {
            background: var(--accent);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="ai-loader">CARTHAGE AI</div>
    </div>

    <div class="app-container">
        <header>
            <h1>Carthage AI</h1>
            <p style="color:#555; font-size:0.8rem;">تعديل الصور بالذكاء البرمجي</p>
        </header>

        <div class="preview-area" id="dropZone">
            <label id="upload-btn" for="imageLoader">تحميل صورة</label>
            <input type="file" id="imageLoader" accept="image/*" style="display:none">
            <canvas id="mainCanvas"></canvas>
        </div>

        <button class="magic-btn" id="magicBtn" onclick="autoEnhance()">✨ تحسين تلقائي ذكي</button>

        <div class="glass-panel" id="manualUI" style="display:none">
            <div class="control-row">
                <label>السطوع</label>
                <input type="range" id="brightness" min="50" max="150" value="100">
            </div>
            <div class="control-row">
                <label>التشبع</label>
                <input type="range" id="saturate" min="0" max="200" value="100">
            </div>
        </div>

        <div class="filters-scroll" id="filtersUI">
            <div class="filter-chip" onclick="setPreset('none')">الأصل</div>
            <div class="filter-chip" onclick="setPreset('contrast(1.2) saturate(1.1) brightness(1.1)')">Vivid</div>
            <div class="filter-chip" onclick="setPreset('grayscale(100%) contrast(1.2)')">Noir</div>
            <div class="filter-chip" onclick="setPreset('sepia(0.3) brightness(0.9) contrast(1.2)')">Vintage</div>
            <div class="filter-chip" onclick="setPreset('hue-rotate(180deg)')">Cyber</div>
        </div>

        <button class="download-btn" id="downloadBtn" onclick="downloadImage()">حفظ الصورة</button>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const br = document.getElementById('brightness');
        const sat = document.getElementById('saturate');
        let imgObj = new Image();

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
            }, 2000);
        };

        imageLoader.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                imgObj.onload = () => {
                    canvas.width = imgObj.width;
                    canvas.height = imgObj.height;
                    canvas.style.display = 'block';
                    document.getElementById('upload-btn').style.display = 'none';
                    document.getElementById('manualUI').style.display = 'block';
                    document.getElementById('filtersUI').style.display = 'flex';
                    document.getElementById('magicBtn').style.display = 'block';
                    document.getElementById('downloadBtn').style.display = 'block';
                    update();
                }
                imgObj.src = ev.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        function update() {
            ctx.filter = `brightness(${br.value}%) saturate(${sat.value}%)`;
            ctx.drawImage(imgObj, 0, 0);
        }

        [br, sat].forEach(i => i.oninput = update);

        function setPreset(f) {
            ctx.filter = f;
            ctx.drawImage(imgObj, 0, 0);
        }

        // ميزة التعديل التلقائي
        function autoEnhance() {
            br.value = 110; // زيادة الإضاءة قليلاً
            sat.value = 125; // تحسين الألوان
            // إضافة لمسة تباين برمجية
            ctx.filter = `brightness(110%) saturate(125%) contrast(115%)`;
            ctx.drawImage(imgObj, 0, 0);
            alert("تم التحسين التلقائي بنجاح! ✨");
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'Carthage_AI.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
