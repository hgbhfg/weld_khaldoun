<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carthage AI Pro - Optimized</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Readex+Pro:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff2d55;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* واجهة الدخول */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 0.8s ease-in-out;
        }

        .ai-loader {
            color: var(--accent);
            font-size: 2.5rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 8px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.3; transform: scale(0.9); } to { opacity: 1; transform: scale(1.1); } }

        body {
            font-family: 'Readex Pro', sans-serif;
            background: #080808;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            padding-bottom: 140px;
        }

        header h1 {
            text-align: center;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        .preview-area {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { max-width: 100%; display: none; touch-action: none; will-change: filter; }

        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }

        .panel-title { font-size: 0.9rem; color: #D4AF37; margin-bottom: 15px; text-align: right; font-weight: bold; }

        .control-row { margin-bottom: 15px; }
        .control-row label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #bbb; margin-bottom: 8px; }

        input[type="range"] {
            width: 100%; height: 4px; background: #333; border-radius: 2px; appearance: none; accent-color: var(--accent);
        }

        .filters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .filter-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 450px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 100;
            border-radius: 24px 24px 0 0;
        }

        .tool-btn {
            background: none; border: none; color: #666; font-size: 0.75rem;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        .tool-btn.active { color: var(--accent); }

        #downloadBtn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
        #upload-btn-label { background: var(--accent); color: white; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        #brush-cursor { width: 25px; height: 25px; border: 2px solid #fff; border-radius: 50%; position: fixed; pointer-events: none; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="ai-loader">CARTHAGE AI</div></div>
    <div id="brush-cursor"></div>

    <div class="app-container">
        <header><h1>Carthage AI</h1></header>

        <div class="preview-area" id="dropZone">
            <label id="upload-btn-label" for="imageLoader">تحميل صورة</label>
            <input type="file" id="imageLoader" accept="image/*" style="display:none">
            <canvas id="imageCanvas"></canvas>
        </div>

        <div class="glass-panel" id="adjustPanel">
            <div class="panel-title">الضبط الاحترافي</div>
            <div class="control-row"><label>السطوع</label><input type="range" id="brightness" min="50" max="150" value="100"></div>
            <div class="control-row"><label>التباين</label><input type="range" id="contrast" min="50" max="150" value="100"></div>
            <div class="control-row"><label>التشبع</label><input type="range" id="saturate" min="0" max="200" value="100"></div>
        </div>

        <div class="glass-panel" id="filterPanel">
            <div class="panel-title">فلاتر المشاهير</div>
            <div class="filters-grid">
                <div class="filter-card" onclick="setPreset('contrast(1.2) saturate(1.3)')"><span>Vivid</span></div>
                <div class="filter-card" onclick="setPreset('sepia(0.3) contrast(1.1)')"><span>Old Money</span></div>
                <div class="filter-card" onclick="setPreset('grayscale(100%)')"><span>Noir</span></div>
                <div class="filter-card" onclick="setPreset('none')"><span>Original</span></div>
            </div>
        </div>

        <div class="glass-panel" id="eraserPanel">
            <div class="panel-title">الممحاة الذكية</div>
            <input type="range" id="brushSize" min="5" max="80" value="30" style="width:100%">
        </div>
    </div>

    <div class="bottom-bar" id="toolBar" style="display: none;">
        <button class="tool-btn active" onclick="showPanel('adjust')"><span>🎛️</span><span>ضبط</span></button>
        <button class="tool-btn" onclick="showPanel('filter')"><span>📸</span><span>فلاتر</span></button>
        <button class="tool-btn" onclick="showPanel('eraser'); startEraserMode()"><span>✨</span><span>ممحاة</span></button>
        <button id="downloadBtn" onclick="downloadImage()">حفظ</button>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const brushCursor = document.getElementById('brush-cursor');

        let imgObj = new Image(), isEraserMode = false, isDrawing = false, brushSize = 30;
        let updateTimeout;

        window.onload = () => { setTimeout(() => { 
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
        }, 1500); };

        imageLoader.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                imgObj.onload = () => {
                    const maxWidth = Math.min(window.innerWidth - 40, 450);
                    canvas.width = maxWidth; canvas.height = imgObj.height * (maxWidth / imgObj.width);
                    canvas.style.display = 'block';
                    document.getElementById('upload-btn-label').style.display = 'none';
                    document.getElementById('toolBar').style.display = 'flex';
                    showPanel('adjust'); update(true);
                }
                imgObj.src = ev.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        // دالة التحديث المحسنة لإزالة الرزن
        function update(immediate = false) {
            if (isEraserMode) return;

            // إذا كان المستخدم يحرك الشريط بسرعة، نؤجل المعالجة الثقيلة
            clearTimeout(updateTimeout);
            
            const b = document.getElementById('brightness').value;
            const c = document.getElementById('contrast').value;
            const s = document.getElementById('saturate').value;

            const applyFilters = () => {
                ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
                ctx.drawImage(imgObj, 0, 0, canvas.width, canvas.height);
            };

            if (immediate) {
                applyFilters();
            } else {
                // وضع معاينة سريعة جداً
                canvas.style.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
                // المعالجة الحقيقية بعد 20 جزء من الثانية من التوقف
                updateTimeout = setTimeout(applyFilters, 20);
            }
        }

        ['brightness', 'contrast', 'saturate'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => update(false));
        });

        function showPanel(name) {
            document.querySelectorAll('.glass-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name + 'Panel').style.display = 'block';
            if(event) event.currentTarget.classList.add('active');
            isEraserMode = (name === 'eraser');
            brushCursor.style.display = isEraserMode ? 'block' : 'none';
        }

        function setPreset(f) {
            if(f === 'none') { update(true); return; }
            ctx.filter = f;
            ctx.drawImage(imgObj, 0, 0, canvas.width, canvas.height);
        }

        // تحسين أداء الممحاة
        canvas.addEventListener('pointerdown', (e) => { if(!isEraserMode) return; isDrawing = true; ctx.beginPath(); });
        canvas.addEventListener('pointermove', (e) => {
            if(!isEraserMode) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX);
            const y = (e.clientY || e.touches[0].clientY);
            
            brushCursor.style.transform = `translate(${x - brushSize/2}px, ${y - brushSize/2}px)`;
            
            if(!isDrawing) return;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = brushSize; ctx.lineCap = 'round';
            ctx.lineTo(x - rect.left, y - rect.top);
            ctx.stroke();
        });
        window.addEventListener('pointerup', () => { isDrawing = false; ctx.globalCompositeOperation = 'source-over'; });

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'Carthage_Optimized.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
