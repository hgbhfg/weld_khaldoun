<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carthage AI - قرطاج الذكي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Readex+Pro:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff2d55;
            --magic: #a855f7;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* واجهة الدخول - Netflix Style */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 0.8s ease-in-out;
        }

        .ai-loader {
            color: var(--accent);
            font-size: 2.5rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 8px;
            animation: pulse 2s infinite alternate;
            text-shadow: 0 0 30px rgba(255, 45, 85, 0.5);
        }

        @keyframes pulse {
            from { opacity: 0.3; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }

        body {
            font-family: 'Readex Pro', sans-serif;
            background: #080808;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            padding-bottom: 120px;
        }

        header { text-align: center; margin-bottom: 20px; }
        header h1 {
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            margin: 0;
        }

        /* منطقة المعاينة */
        .preview-area {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #imageCanvas {
            max-width: 100%;
            display: none;
            touch-action: none;
        }

        /* لوحات التحكم */
        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }

        .panel-title { font-size: 0.9rem; color: #D4AF37; margin-bottom: 12px; text-align: right; font-weight: bold; }

        .control-row { margin-bottom: 12px; }
        .control-row label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; text-align: right; }

        input[type="range"] {
            width: 100%; height: 4px; background: #333; border-radius: 2px; appearance: none; accent-color: var(--accent);
        }

        /* شريط الأدوات السفلي */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 450px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 100;
            border-radius: 24px 24px 0 0;
        }

        .tool-btn {
            background: none; border: none; color: #666; font-family: 'Readex Pro', sans-serif;
            font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
        }

        .tool-btn.active { color: var(--accent); }
        .tool-icon { font-size: 1.3rem; }

        .filters-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .filter-chip {
            flex: 0 0 auto; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #ddd; padding: 8px 16px; border-radius: 50px; font-size: 0.7rem;
        }

        #downloadBtn {
            background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold;
        }

        #upload-btn-label {
            background: var(--accent); color: white; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer;
        }

        #brush-cursor {
            width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%;
            position: fixed; pointer-events: none; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="ai-loader">CARTHAGE AI</div>
    </div>
    
    <div id="brush-cursor"></div>

    <div class="app-container">
        <header>
            <h1>Carthage AI</h1>
        </header>

        <div class="preview-area" id="dropZone">
            <label id="upload-btn-label" for="imageLoader">تحميل صورة</label>
            <input type="file" id="imageLoader" accept="image/*" style="display:none">
            <canvas id="imageCanvas"></canvas>
        </div>

        <div class="glass-panel" id="adjustPanel">
            <div class="panel-title">الضبط الاحترافي</div>
            <div class="control-row"><label>السطوع</label><input type="range" id="brightness" min="50" max="150" value="100"></div>
            <div class="control-row"><label>التباين</label><input type="range" id="contrast" min="50" max="150" value="100"></div>
            <div class="control-row"><label>التشبع</label><input type="range" id="saturate" min="0" max="200" value="100"></div>
            <div class="control-row"><label>درجة الحرارة (Warmth)</label><input type="range" id="warmth" min="-50" max="50" value="0"></div>
            <div class="control-row"><label>الحدة (Blur)</label><input type="range" id="blur" min="0" max="10" value="0" step="0.1"></div>
        </div>

        <div class="glass-panel" id="filterPanel">
            <div class="panel-title">فلاتر ذكية</div>
            <div class="filters-scroll">
                <div class="filter-chip" onclick="setPreset('none')">الأصل</div>
                <div class="filter-chip" onclick="setPreset('contrast(1.2) saturate(1.2) brightness(1.1)')">Vivid AI</div>
                <div class="filter-chip" onclick="setPreset('sepia(0.5) contrast(1.1) brightness(0.9)')">Vintage</div>
                <div class="filter-chip" onclick="setPreset('grayscale(100%) contrast(1.3)')">Noir</div>
                <div class="filter-chip" onclick="setPreset('hue-rotate(180deg) saturate(1.5)')">Cyber</div>
            </div>
        </div>

        <div class="glass-panel" id="eraserPanel">
            <div class="panel-title">الممحاة المتطورة</div>
            <div class="control-row">
                <label>حجم الفرشاة</label>
                <input type="range" id="brushSize" min="5" max="60" value="25">
            </div>
            <button onclick="resetAll()" style="width:100%; background:var(--glass); border:1px solid var(--border); color:#fff; padding:10px; border-radius:10px;">إعادة تعيين الصورة</button>
        </div>
    </div>

    <div class="bottom-bar" id="toolBar" style="display: none;">
        <button class="tool-btn active" onclick="showPanel('adjust')"><span class="tool-icon">🎛️</span><span>ضبط</span></button>
        <button class="tool-btn" onclick="showPanel('filter')"><span class="tool-icon">🎬</span><span>فلاتر</span></button>
        <button class="tool-btn" onclick="showPanel('eraser'); startEraserMode()"><span class="tool-icon">✨</span><span>ممحاة</span></button>
        <button id="downloadBtn" onclick="downloadImage()">حفظ</button>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const br = document.getElementById('brightness'), con = document.getElementById('contrast'), 
              sat = document.getElementById('saturate'), warm = document.getElementById('warmth'), 
              blr = document.getElementById('blur'), brushSizeInput = document.getElementById('brushSize'),
              brushCursor = document.getElementById('brush-cursor');

        let imgObj = new Image(), isEraserMode = false, isDrawing = false, brushSize = 25;

        window.onload = () => { setTimeout(() => { 
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
        }, 2000); };

        imageLoader.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                imgObj.onload = () => {
                    const maxWidth = document.getElementById('dropZone').offsetWidth;
                    canvas.width = maxWidth; canvas.height = imgObj.height * (maxWidth / imgObj.width);
                    canvas.style.display = 'block';
                    document.getElementById('upload-btn-label').style.display = 'none';
                    document.getElementById('toolBar').style.display = 'flex';
                    showPanel('adjust'); update();
                }
                imgObj.src = ev.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        function update() {
            if (isEraserMode) return;
            const warmthEffect = warm.value > 0 ? `sepia(${warm.value}%)` : `hue-rotate(${Math.abs(warm.value)}deg)`;
            ctx.filter = `brightness(${br.value}%) contrast(${con.value}%) saturate(${sat.value}%) ${warmthEffect} blur(${blr.value}px)`;
            ctx.drawImage(imgObj, 0, 0, canvas.width, canvas.height);
        }

        [br, con, sat, warm, blr].forEach(i => i.oninput = update);

        function showPanel(name) {
            document.querySelectorAll('.glass-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name + 'Panel').style.display = 'block';
            event.currentTarget.classList.add('active');
            isEraserMode = (name === 'eraser');
            canvas.style.cursor = isEraserMode ? 'none' : 'default';
        }

        function setPreset(f) { ctx.filter = f; ctx.drawImage(imgObj, 0, 0, canvas.width, canvas.height); }
        function resetAll() { [br, con, sat, warm, blr].forEach(i => i.value = i.getAttribute('value')); update(); }

        // الممحاة
        function startEraserMode() { brushCursor.style.display = 'block'; }
        brushSizeInput.oninput = (e) => { brushSize = e.target.value; brushCursor.style.width = brushSize + 'px'; brushCursor.style.height = brushSize + 'px'; };

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.clientX || e.touches[0].clientX) - rect.left, y: (e.clientY || e.touches[0].clientY) - rect.top };
        }

        canvas.addEventListener('pointerdown', (e) => { if(!isEraserMode) return; isDrawing = true; ctx.beginPath(); });
        canvas.addEventListener('pointermove', (e) => {
            if(!isEraserMode) return;
            brushCursor.style.left = (e.clientX || e.touches[0].clientX) - brushSize/2 + 'px';
            brushCursor.style.top = (e.clientY || e.touches[0].clientY) - brushSize/2 + 'px';
            if(!isDrawing) return;
            const p = getPos(e);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = brushSize; ctx.lineCap = 'round'; ctx.lineTo(p.x, p.y); ctx.stroke();
        });
        window.addEventListener('pointerup', () => { isDrawing = false; ctx.globalCompositeOperation = 'source-over'; });

        function downloadImage() {
            const link = document.createElement('a'); link.download = 'Carthage_AI.png';
            link.href = canvas.toDataURL(); link.click();
        }
    </script>
</body>
</html>
