<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر صور الهاتف</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        .upload-section { margin-bottom: 20px; padding: 20px; border: 2px dashed #444; border-radius: 10px; }
        img { max-width: 100%; border-radius: 10px; margin-top: 20px; transition: 0.4s; display: none; } /* مخفية حتى يتم اختيار صورة */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: 20px auto; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: #007bff; color: white; font-weight: bold; }
        input[type="file"] { margin-top: 10px; }
    </style>
</head>
<body>

    <h2>محرر الصور من هاتفك</h2>
    
    <div class="upload-section">
        <p>اختر صورة من معرض الصور:</p>
        <input type="file" id="imageLoader" accept="image/*">
    </div>

    <img id="displayImage" src="#" alt="صورتك">

    <div class="controls">
        <button onclick="applyFilter('grayscale(100%)')">أبيض وأسود</button>
        <button onclick="applyFilter('sepia(100%)')">طابع قديم</button>
        <button onclick="applyFilter('hue-rotate(90deg)')">تغيير الألوان</button>
        <button onclick="applyFilter('none')">الأصلية</button>
    </div>

    <script>
        // هذا الجزء هو المسؤول عن قراءة الصورة من هاتفك وعرضها
        const imageLoader = document.getElementById('imageLoader');
        const displayImage = document.getElementById('displayImage');

        imageLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                displayImage.src = event.target.result;
                displayImage.style.display = 'inline-block'; // إظهار الصورة بعد الرفع
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        function applyFilter(filterValue) {
            displayImage.style.filter = filterValue;
        }
    </script>

</body>
</html>
