<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر ومحمل الصور</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        .upload-section { margin-bottom: 20px; padding: 20px; border: 2px dashed #444; border-radius: 10px; }
        img, canvas { max-width: 100%; border-radius: 10px; margin-top: 20px; display: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: 20px auto; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: #007bff; color: white; font-weight: bold; }
        .download-btn { background-color: #28a745; grid-column: span 2; margin-top: 10px; }
        input[type="file"] { margin-top: 10px; }
    </style>
</head>
<body>

    <h2>محرر الصور مع خاصية التحميل</h2>
    
    <div class="upload-section">
        <p>اختر صورة من هاتفك:</p>
        <input type="file" id="imageLoader" accept="image/*">
    </div>

    <canvas id="imageCanvas"></canvas>
    <img id="displayImage" src="#" alt="صورتك">

    <div class="controls">
        <button onclick="applyFilter('grayscale(100%)')">أبيض وأسود</button>
        <button onclick="applyFilter('sepia(100%)')">طابع قديم</button>
        <button onclick="applyFilter('contrast(150%)')">تباين عالٍ</button>
        <button onclick="applyFilter('none')">الأصلية</button>
        <button class="download-btn" onclick="downloadImage()">تحميل الصورة المعدلة ↓</button>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        let currentFilter = 'none';
        let imgObj = new Image();

        imageLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                imgObj.onload = function() {
                    // ضبط حجم الـ canvas ليكون نفس حجم الصورة الأصلية
                    canvas.width = imgObj.width;
                    canvas.height = imgObj.height;
                    canvas.style.display = 'inline-block';
                    draw();
                }
                imgObj.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        function applyFilter(filterValue) {
            currentFilter = filterValue;
            draw();
        }

        function draw() {
            ctx.filter = currentFilter;
            ctx.drawImage(imgObj, 0, 0);
        }

        function downloadImage() {
            // إنشاء رابط وهمي لتحميل الصورة
            const link = document.createElement('a');
            link.download = 'my-edited-photo.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>

</body>
</html>
