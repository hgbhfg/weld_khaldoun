<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carthage Photo - قرطاج فوتو</title>
    <style>
        :root {
            --tunisian-red: #E70013; /* أحمر العلم التونسي */
            --gold: #D4AF37; /* لون دروع حنبعل */
            --bg: #0b0b0b;
            --card-bg: #1a1a1a;
            --text: #f0f0f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: center;
            align-items: center;
            flex-direction: column;
        }

        .app-container { width: 100%; max-width: 500px; }

        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        header h1 { color: var(--tunisian-red); margin: 0; font-size: 1.8rem; }
        header p { color: var(--gold); font-style: italic; margin: 5px 0; font-size: 0.9rem; }

        .upload-section {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            text-align: center;
            margin-bottom: 20px;
        }

        .custom-upload {
            background: var(--tunisian-red);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(231, 0, 19, 0.4);
        }

        input[type="file"] { display: none; }

        canvas { width: 100%; border-radius: 10px; margin-bottom: 20px; display: none; border: 1px solid var(--gold); }

        /* لوحة التحكم اليدوية */
        .manual-controls {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .control-group { margin-bottom: 15px; text-align: right; }
        .control-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--gold); }
        input[type="range"] { width: 100%; accent-color: var(--tunisian-red); }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            display: none;
        }

        .btn {
            background: #2a2a2a;
            border: 1px solid var(--gold);
            color: white;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .btn-main {
            grid-column: span 3;
            background: var(--success, #28a745);
            border: none;
            font-weight: bold;
            margin-top: 15px;
            padding: 15px;
            font-size: 1rem;
        }

        footer { margin-top: 30px; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Carthage Photo</h1>
            <p>"على خطى حنبعل.. نصنع الجمال"</p>
        </header>

        <div class="upload-section" id="uploadBox">
            <label for="imageLoader" class="custom-upload">ابدأ الرحلة (اختر صورة)</label>
            <input type="file" id="imageLoader" accept="image/*">
        </div>

        <canvas id="mainCanvas"></canvas>

        <div class="manual-controls" id="manualUI">
            <div class="control-group">
                <label>السطوع (Brightness)</label>
                <input type="range" id="brightness" min="0" max="200" value="100">
            </div>
            <div class="control-group">
                <label>التباين (Contrast)</label>
                <input type="range" id="contrast" min="0" max="200" value="100">
            </div>
            <div class="control-group">
                <label>تشبع الألوان (Saturate)</label>
                <input type="range" id="saturate" min="0" max="200" value="100">
            </div>
        </div>

        <div class="filters-grid" id="filtersUI">
            <button class="btn" onclick="setPreset('grayscale(100%)')">أبيض وأسود</button>
            <button class="btn" onclick="setPreset('sepia(80%) contrast(110%)')">قرطاج القديمة</button>
            <button class="btn" onclick="setPreset('hue-rotate(180deg)')">ألوان خيالية</button>
            <button class="btn" onclick="setPreset('invert(100%)')">سالب (Negative)</button>
            <button class="btn" onclick="setPreset('blur(2px)')">تغبيش هادئ</button>
            <button class="btn" onclick="resetAll()">إعادة الأصل</button>
            <button class="btn btn-main" onclick="downloadImage()">حفظ في الهاتف (نصر قرطاج) ↓</button>
        </div>

        <footer>صُنع بلمسة تونسية على GitHub</footer>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        // عناصر التحكم اليدوي
        const brightness = document.getElementById('brightness');
        const contrast = document.getElementById('contrast');
        const saturate = document.getElementById('saturate');

        let imgObj = new Image();

        imageLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                imgObj.onload = function() {
                    canvas.width = imgObj.width;
                    canvas.height = imgObj.height;
                    canvas.style.display = 'block';
                    document.getElementById('manualUI').style.display = 'block';
                    document.getElementById('filtersUI').style.display = 'grid';
                    document.getElementById('uploadBox').style.display = 'none';
                    updateImage();
                }
                imgObj.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // الاستماع لتغييرات أشرطة التحكم
        [brightness, contrast, saturate].forEach(input => {
            input.addEventListener('input', updateImage);
        });

        function updateImage() {
            const filterString = `brightness(${brightness.value}%) contrast(${contrast.value}%) saturate(${saturate.value}%)`;
            ctx.filter = filterString;
            ctx.drawImage(imgObj, 0, 0);
        }

        function setPreset(filter) {
            // إعادة تصفير الأشرطة عند اختيار فلتر جاهز (اختياري)
            ctx.filter = filter;
            ctx.drawImage(imgObj, 0, 0);
        }

        function resetAll() {
            brightness.value = 100;
            contrast.value = 100;
            saturate.value = 100;
            updateImage();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'Carthage_Photo.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
